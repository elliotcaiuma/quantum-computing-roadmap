name: Run Code Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run Phase 1 samples (Single-Qubit)
      env:
        PYTHONUTF8: "1"
        PYTHONIOENCODING: "utf-8"
      run: |
        echo "=== Testing Phase 1: Single-Qubit ==="
        python main/code/foundations/01_hello_qubit.py
        python main/code/foundations/04_custom_state.py
        python main/code/foundations/09_gate_transformer.py
    
    - name: Run Phase 2 samples (Multi-Qubit)
      env:
        PYTHONUTF8: "1"
        PYTHONIOENCODING: "utf-8"
      run: |
        echo "=== Testing Phase 2: Multi-Qubit ==="
        python main/code/multi_qubit/11_hello_2qubit.py
        python main/code/multi_qubit/14_create_bell_phi_plus.py
        python main/code/multi_qubit/19_ancilla_measurement.py
    
    - name: Run Phase 3 samples (Density Matrix)
      env:
        PYTHONUTF8: "1"
        PYTHONIOENCODING: "utf-8"
      run: |
        echo "=== Testing Phase 3: Density Matrix ==="
        python main/code/density_matrix/21_create_density_matrix.py
        python main/code/density_matrix/26_schmidt_decomposition.py
        python main/code/density_matrix/29_complete_analyzer.py
    
    - name: Run Phase 4 samples (Algorithms)
      env:
        PYTHONUTF8: "1"
        PYTHONIOENCODING: "utf-8"
      run: |
        echo "=== Testing Phase 4: Quantum Algorithms ==="
        python main/code/algorithms/30_oracle_functions.py
        python main/code/algorithms/31_deutsch_jozsa.py
        python main/code/algorithms/32_grover_search.py
        python main/code/algorithms/33_phase_estimation.py
        python main/code/algorithms/34_shor_factoring.py
        python main/code/algorithms/35_quantum_fourier_transform.py
