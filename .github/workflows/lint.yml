name: Lint Python

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint
    
    - name: Run pylint
      run: |
        # Run pylint on all Python files in main/code/
        # Disable missing docstring warnings for module/class/function (C0114, C0115, C0116)
        # These are educational scripts, not a library
        pylint main/code/**/*.py --disable=C0114,C0115,C0116,R0801 --exit-zero
        
        # R0801 = duplicate code (expected in educational progression)
        # --exit-zero = don't fail CI, just report warnings
